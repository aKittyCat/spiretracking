<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="supabase-config.js"></script> <title>ตัวละครของฉัน</title>
</head>
<body class="bg-gray-900 text-gray-200 p-4 sm:p-6 min-h-screen font-sans">
  <div class="max-w-4xl mx-auto">
    
    <div class="flex flex-col sm:flex-row justify-between items-center mb-6 pb-4 border-b border-gray-700 gap-4">
      <h1 class="text-2xl sm:text-3xl font-bold text-white">ตัวละครของฉัน</h1>
      <div class="flex items-center gap-3">
        <span class="text-gray-400 text-sm">สมาชิก: <span id="userEmail" class="text-gray-200">...</span></span>
        <button onclick="handleLogout()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm shadow">ออกจากระบบ</button>
      </div>
    </div>

    <div class="flex flex-wrap gap-4 mb-6">
        <button id="adminBtn" style="display:none" onclick="location.href='dashboard.html'" class="bg-purple-600 hover:bg-purple-500 text-white px-4 py-1 rounded shadow text-sm font-medium flex items-center">
            👑 Admin Dashboard
        </button>
        <button onclick="window.open('https://spireform.vercel.app/', '_blank')" class="bg-orange-600 hover:bg-orange-500 text-white px-4 py-1 rounded shadow text-sm font-medium">
            📄 ฟอร์มสร้างตัวละคร
        </button>
        <button onclick="window.open('https://spiremk.vercel.app/', '_blank')" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1 rounded shadow text-sm font-medium">
            🛒 ร้านค้า
        </button>
    </div>

    <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg mb-8">
      <h2 class="text-xl font-semibold mb-4 text-white">⚔️ เพิ่มตัวละครใหม่</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
        <input id="charName" placeholder="ชื่อตัวละคร" class="col-span-1 sm:col-span-2 w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500 outline-none"/>
        <input id="charLevel" type="number" min="1" placeholder="เลเวล" class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500 outline-none"/>
        <input id="charClass" placeholder="อาชีพ" class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500 outline-none"/>
        <input id="charRace" placeholder="เผ่า" class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500 outline-none"/>
        <input id="charGold" type="number" placeholder="ทองเริ่มต้น" class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500 outline-none"/>
      </div>
      <input id="sheetLink" placeholder="ลิงก์ Character Sheet" class="w-full p-2.5 mb-4 rounded bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500 outline-none"/>
      <button onclick="addCharacter()" class="bg-green-600 hover:bg-green-500 text-white font-bold px-6 py-2.5 rounded-lg shadow">บันทึกตัวละคร</button>
    </div>

    <div id="charactersList" class="space-y-4"></div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/fetch.js"></script>
  <script>
    let currentUser = null;

    async function init() {
      // ตรวจสอบว่า Supabase โหลดเรียบร้อยไหม
      if (typeof supabase === 'undefined') {
          alert('❌ ไม่พบ Supabase Client! กรุณาตรวจสอบไฟล์ supabase-config.js');
          return;
      }

      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      currentUser = session.user;
      document.getElementById('userEmail').textContent = currentUser.email;
      
      checkAdmin();
      loadCharacters();
    }
    init();

    async function checkAdmin() {
        const { data } = await supabase.rpc('is_admin'); 
        if (data) document.getElementById('adminBtn').style.display = 'inline-flex';
    }

    async function addCharacter() {
      const name = document.getElementById('charName').value.trim();
      if (!name) return alert('ใส่ชื่อตัวละคร');

      const { error } = await supabase.from('characters').insert({
        user_id: currentUser.id,
        name: name,
        level: document.getElementById('charLevel').value || 1,
        class: document.getElementById('charClass').value || 'None',
        race: document.getElementById('charRace').value || 'None',
        gold_start: document.getElementById('charGold').value || 0,
        sheet_link: document.getElementById('sheetLink').value
      });

      if (error) alert('Error: ' + error.message);
      else {
        alert('✅ เพิ่มสำเร็จ!');
        // Clear inputs...
        document.querySelectorAll('input').forEach(i => i.value = '');
        loadCharacters();
      }
    }

    async function loadCharacters() {
      // ✅ แก้ไข: เปลี่ยนจาก order by created_at (ซึ่งไม่มีใน View) เป็น order by name แทน
      const { data, error } = await supabase
        .from('character_stats')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('name', { ascending: true }); 

      if (error) {
          console.error('Load Error:', error);
          return;
      }
      
      const list = document.getElementById('charactersList');
      list.innerHTML = '';
      
      if (!data || data.length === 0) {
          list.innerHTML = '<p class="text-gray-500 text-center py-8">ยังไม่มีตัวละคร</p>';
          return;
      }
      
      data.forEach(c => {
        const { level: currentLevel } = calculateCurrentLevel(c.base_level || 1, Number(c.total_hours || 0));
        
        list.innerHTML += `
          <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-md flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
             <div>
                <h3 class="font-bold text-xl text-yellow-500">${c.name} <span class="text-gray-400 text-sm">(Lv. ${currentLevel})</span></h3>
                <p class="text-gray-300 text-sm mt-1">
                    <span class="bg-gray-700 px-2 py-0.5 rounded text-xs mr-1">อาชีพ: ${c.class || '-'}</span>
                    <span class="bg-gray-700 px-2 py-0.5 rounded text-xs mr-1">เผ่า: ${c.race || '-'}</span>
                    <span class="text-yellow-400 font-medium">💰 ${(Number(c.total_gold)||0).toLocaleString()} gp</span>
                </p>
             </div>
             <div class="flex items-center gap-3 w-full sm:w-auto justify-end border-t sm:border-t-0 border-gray-700 pt-3 sm:pt-0">
                ${c.sheet_link ? `<a href="${c.sheet_link}" target="_blank" class="text-blue-400 hover:text-blue-300 text-sm">📄 Sheet</a>` : ''}
                <a href="character-detail.html?charId=${c.character_id}" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium flex items-center gap-1">
                    📝 รายละเอียด
                </a>
                <button onclick="deleteChar('${c.character_id}')" class="text-red-400 hover:text-red-300 text-sm font-medium ml-2 border-l border-gray-600 pl-3">
                    🗑️ ลบ
                </button>
             </div>
          </div>
        `;
      });
    }

    async function deleteChar(id) {
        if(!confirm('ยืนยันลบ?')) return;
        const { error } = await deleteCharacterAndData(id, true); // ใช้ function จาก utils.js
        if(error) alert(error.message);
        else {
            alert('ลบเรียบร้อย');
            loadCharacters();
        }
    }

    async function handleLogout() {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
    }

    // Helper Level Calculation
    const LEVEL_HOURS = [0, 0, 3.5, 10.5, 21, 35, 52.5, 70, 91, 115.5, 143.5, 175, 210, 248.5, 290.5, 336, 385, 437.5, 493.5, 553, 616, 682.5, 752.5, 826, 903, 983.5, 1067.5, 1155, 1246, 1340.5, 1438.5, 1540];
    function calculateCurrentLevel(start, hours) {
        let lvl = start;
        const total = (LEVEL_HOURS[start] || 0) + hours;
        for(let i=start+1; i<=30; i++) { if(total >= LEVEL_HOURS[i]) lvl = i; else break; }
        return { level: lvl };
    }
  </script>
</body>
</html>
