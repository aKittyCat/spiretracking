<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>ตัวละครของฉัน</title>
</head>
<body class="bg-gray-900 text-gray-200 p-4 sm:p-6 min-h-screen font-sans">
  <div class="max-w-4xl mx-auto">
    
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 pb-4 border-b border-gray-700 gap-4">
      <h1 class="text-2xl sm:text-3xl font-bold text-white">ตัวละครของฉัน</h1>
      
      <div class="flex flex-wrap items-center gap-3 w-full sm:w-auto justify-between sm:justify-end">
        <span class="text-gray-400 text-sm font-medium truncate max-w-[150px] sm:max-w-none">
          สมาชิก: <span id="userEmail" class="text-gray-200">...</span>
        </span>
        <button onclick="auth.signOut().then(() => location.href='index.html')" 
                class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow transition">
          ออกจากระบบ
        </button>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row gap-4 mb-6">
        <button 
            id="adminBtn" 
            style="display:none" 
            onclick="location.href='dashboard.html'" 
            class="
                inline-flex items-center justify-center
                w-full sm:w-auto 
                bg-purple-600 hover:bg-purple-500 text-white 
                px-4 py-1 rounded shadow transition 
                duration-300 ease-in-out transform hover:scale-105 
                focus:outline-none focus:ring-4 focus:ring-purple-500 focus:ring-opacity-50
                text-sm font-medium
            ">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            Admin Dashboard
        </button>

        <button 
            onclick="window.open('https://spireform.vercel.app/', '_blank');"
            class="
                inline-flex items-center justify-center 
                w-full sm:w-auto 
                bg-orange-600 hover:bg-orange-500 text-white 
                px-4 py-1 rounded shadow transition 
                duration-300 ease-in-out transform hover:scale-105 
                focus:outline-none focus:ring-4 focus:ring-orange-500 focus:ring-opacity-50
                text-sm font-medium
            ">
            <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            ฟอร์มสร้างตัวละคร
        </button>

        <button 
            onclick="window.open('https://spiremk.vercel.app/', '_blank');"
            class="
                inline-flex items-center justify-center 
                w-full sm:w-auto 
                bg-blue-600 hover:bg-blue-500 text-white 
                px-4 py-1 rounded shadow transition 
                duration-300 ease-in-out transform hover:scale-105 
                focus:outline-none focus:ring-4 focus:ring-blue-500 focus:ring-opacity-50
                text-sm font-medium
            ">
            <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l-1 12H6L5 9z"></path>
            </svg>
            ร้านค้า
        </button>
    </div>

    <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg mb-8">
      <h2 class="text-xl font-semibold mb-4 text-white flex items-center gap-2">
        <span>⚔️</span> เพิ่มตัวละครใหม่
      </h2>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
        <input id="charName" placeholder="ชื่อตัวละคร" 
               class="col-span-1 sm:col-span-2 w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
        
        <input id="charLevel" type="number" min="1" max="20" placeholder="เลเวล (ปกติเริ่ม 3)" 
               class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
        
        <input id="charClass" placeholder="อาชีพ" 
               class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
        
        <input id="charRace" placeholder="เผ่า" 
               class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
        
        <input id="charGold" type="number" placeholder="ทองเริ่มต้น" 
               class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
      </div>

      <input id="sheetLink" placeholder="ลิงก์ชีทตัวละคร Character Sheet (URL)" 
             class="w-full p-2.5 mb-4 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
      
      <p class="text-xs text-blue-300">
          หมายเหตุ: สามารถวางลิงก์ชีทตัวละคร D&D Beyond ลงในช่องลิงก์ชีทตัวละคนเพื่อดึงข้อมูลได้
      </p>
             
      <button onclick="addCharacter()" class="w-full sm:w-auto bg-green-600 hover:bg-green-500 text-white font-bold px-6 py-2.5 rounded-lg shadow transition">
        บันทึกตัวละคร
      </button>
    </div>

    <div id="charactersList" class="space-y-4"></div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/fetch.js"></script>
  <script>
    const CHAR_LIST_CACHE_TTL = 5 * 60 * 1000;

    // บันทึกข้อมูลตัวละครลง localStorage
    function setCharactersCache(characters) {
      const cache = {
        data: characters,
        timestamp: Date.now()
      };
      localStorage.setItem('charListCache', JSON.stringify(cache));
    }

    // ดึงข้อมูลตัวละครจาก localStorage (ถ้ายังไม่หมดอายุ)
    function getCharactersCache() {
      try {
        const item = localStorage.getItem('charListCache');
        if (!item) return null;
        
        const cache = JSON.parse(item);
        if (Date.now() - cache.timestamp > CHAR_LIST_CACHE_TTL) {
          localStorage.removeItem('charListCache');
          return null;
        }
        return cache.data;
      } catch (e) {
        console.warn("Cache error:", e);
        return null;
      }
    }

    let currentUser = null;

    auth.onAuthStateChanged(async user => {
      if (!user) return window.location.href = 'index.html';
      document.getElementById('userEmail').textContent = user.email;
      
      currentUser = user;
      console.log("✅ ล็อกอินสำเร็จด้วยอีเมล:", user.email);
      
      // โหลดตัวละครก่อน
      await loadCharacters();
      
      // ตรวจสอบสิทธิ์ admin แบบละเอียด
      await checkAdmin();
    });

    async function checkAdmin() {
      try {
        console.log("🔍 เริ่มตรวจสอบสิทธิ์ admin...");
        
        const doc = await db.collection('settings').doc('admin').get();
        
        if (!doc.exists) {
          console.error("❌ ไม่พบเอกสาร settings/admin");
          return;
        }
        
        const data = doc.data();
        // ✅ ตรวจสอบว่าเป็น array
        const adminEmails = data.adminEmails || [];
        const currentEmail = currentUser.email?.trim().toLowerCase();
        
        console.log("📧 อีเมลผู้ใช้:", currentEmail);
        console.log("📧 รายชื่อ admin:", adminEmails.map(e => e.trim().toLowerCase()));
        
        // ✅ ตรวจสอบว่าอีเมลผู้ใช้อยู่ในรายการ admin
        const isAdmin = adminEmails
          .map(e => e.trim().toLowerCase())
          .includes(currentEmail);
        
        if (isAdmin) {
          console.log("✅ คุณเป็น admin!");
          document.getElementById('adminBtn').style.display = 'inline-flex';
        } else {
          console.log("❌ ไม่ใช่ admin");
        }
      } catch (error) {
        console.error("💥 เกิดข้อผิดพลาดตอนตรวจสอบ admin:", error);
        alert("ตรวจสอบสิทธิ์ล้มเหลว: " + error.message);
      }
    }

    // เพิ่มตัวละครใหม่
    async function addCharacter() {
      const name = document.getElementById('charName').value.trim();
      if (!name) return alert('กรุณาใส่ชื่อตัวละคร');

      const char = {
        name,
        level: parseInt(document.getElementById('charLevel').value) || 1,
        class: document.getElementById('charClass').value.trim() || 'None',
        race: document.getElementById('charRace').value.trim() || 'None',
        gold: parseInt(document.getElementById('charGold').value) || 0,
        sheetLink: document.getElementById('sheetLink').value || '',
        userId: currentUser.uid,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        await db.collection('characters').add(char);
        alert('เพิ่มตัวละครสำเร็จ!');
        localStorage.removeItem('charListCache');
        loadCharacters();
        // ล้างฟอร์ม
        document.getElementById('charName').value = '';
        document.getElementById('charLevel').value = '';
        document.getElementById('charClass').value = '';
        document.getElementById('charRace').value = '';
        document.getElementById('charGold').value = '';
        document.getElementById('sheetLink').value = '';
      } catch (error) {
        console.error('Error adding character:', error);
        alert('เกิดข้อผิดพลาด: ' + (error.message || 'ไม่สามารถบันทึกได้'));
      }
    }

    // โหลดตัวละคร
    async function loadCharacters() {
      // 1. ลองดึงจากแคชก่อน
      const cached = getCharactersCache();
      if (cached) {
        renderCharacters(cached);
        return;
      }

      // 2. ถ้าไม่มีแคช → โหลดจาก Firestore
      try {
        const snap = await db.collection('characters').where('userId', '==', currentUser.uid).get();
        const characters = [];
        snap.forEach(doc => {
          characters.push({ id: doc.id, ...doc.data() });
        });
        
        // บันทึกลงแคช
        setCharactersCache(characters);
        
        // แสดงผล
        renderCharacters(characters);
      } catch (error) {
        console.error('Error loading characters:', error);
        document.getElementById('charactersList').innerHTML = 
          '<p class="text-red-400 text-center">โหลดข้อมูลไม่ได้ กรุณาลองใหม่</p>';
      }
    }

    function renderCharacters(characters) {
      const list = document.getElementById('charactersList');
      list.innerHTML = '';
      
      if (characters.length === 0) {
        list.innerHTML = '<p class="text-gray-500 text-center py-8">ยังไม่มีตัวละคร</p>';
        return;
      }
      
      characters.forEach(char => {
        const div = document.createElement('div');
        div.className = 'bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-md hover:border-gray-500 transition duration-200';
        div.innerHTML = `
          <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-2">
              <div>
                  <h3 class="font-bold text-xl text-yellow-500">${char.name} 
                    <span class="text-gray-400 text-base font-normal">(Lv. ${char.currentLevel || char.level})</span>
                  </h3>
                  <p class="text-gray-300 text-sm mt-1">
                      <span class="bg-gray-700 px-2 py-0.5 rounded text-xs mr-1">อาชีพ: ${char.class}</span>
                      <span class="bg-gray-700 px-2 py-0.5 rounded text-xs mr-1">เผ่า: ${char.race}</span>
                      <span class="text-yellow-400 font-medium">💰 ${char.totalGold || char.gold} gp</span>
                  </p>
              </div>
              <div class="flex items-center gap-3 mt-3 sm:mt-0 border-t sm:border-t-0 border-gray-700 pt-3 sm:pt-0">
                  ${char.sheetLink ? `<a href="${char.sheetLink}" target="_blank" class="text-blue-400 hover:text-blue-300 text-sm">📄 ดู Sheet</a>` : ''}
                  <a href="character-detail.html?charId=${char.id}" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium">📝 รายละเอียด</a>
                  <button onclick="deleteChar('${char.id}')" class="ml-2 pl-4 border-l border-gray-600 text-red-400 hover:text-red-300 text-sm font-medium">🗑️ ลบ</button>
              </div>
          </div>
        `;
        list.appendChild(div);
      });
    }

    async function deleteChar(charId) {
      if (!confirm('⚠️ ลบตัวละครนี้จริงหรือ? ข้อมูลทั้งหมดจะหายไป!')) return;
      
      const result = await deleteCharacterAndData(charId, true);
      if (result.success) {
        alert(result.message);
        localStorage.removeItem('charListCache');
        loadCharacters();
      } else {
        alert('❌ ' + result.message);
      }
    }
  </script>
</body>
</html>
