<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>ตัวละครของฉัน</title>
</head>
<body class="bg-gray-900 text-gray-200 p-4 sm:p-6 min-h-screen font-sans">
  <div class="max-w-4xl mx-auto">
    
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 pb-4 border-b border-gray-700 gap-4">
      <h1 class="text-2xl sm:text-3xl font-bold text-white">ตัวละครของฉัน</h1>
      
      <div class="flex flex-wrap items-center gap-3 w-full sm:w-auto justify-between sm:justify-end">
        <span class="text-gray-400 text-sm font-medium truncate max-w-[150px] sm:max-w-none">
          สมาชิก: <span id="userEmail" class="text-gray-200">...</span>
        </span>
        <button onclick="logout()" 
                class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow transition">
          ออกจากระบบ
        </button>
      </div>
    </div>

    <div class="flex flex-col sm:flex-row gap-4 mb-6">
        <button 
            id="adminBtn" 
            style="display:none" 
            onclick="location.href='dashboard.html'" 
            class="
                inline-flex items-center justify-center
                w-full sm:w-auto 
                bg-purple-600 hover:bg-purple-500 text-white 
                px-4 py-1 rounded shadow transition 
                duration-300 ease-in-out transform hover:scale-105 
                focus:outline-none focus:ring-4 focus:ring-purple-500 focus:ring-opacity-50
                text-sm font-medium
            ">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            Admin Dashboard
        </button>

        <button 
            onclick="window.open('https://spireform.vercel.app/', '_blank');"
            class="
                inline-flex items-center justify-center 
                w-full sm:w-auto 
                bg-orange-600 hover:bg-orange-500 text-white 
                px-4 py-1 rounded shadow transition 
                duration-300 ease-in-out transform hover:scale-105 
                focus:outline-none focus:ring-4 focus:ring-orange-500 focus:ring-opacity-50
                text-sm font-medium
            ">
            <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            ฟอร์มสร้างตัวละคร
        </button>

        <button 
            onclick="window.open('https://spiremk.vercel.app/', '_blank');"
            class="
                inline-flex items-center justify-center 
                w-full sm:w-auto 
                bg-blue-600 hover:bg-blue-500 text-white 
                px-4 py-1 rounded shadow transition 
                duration-300 ease-in-out transform hover:scale-105 
                focus:outline-none focus:ring-4 focus:ring-blue-500 focus:ring-opacity-50
                text-sm font-medium
            ">
            <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l-1 12H6L5 9z"></path>
            </svg>
            ร้านค้า
        </button>
    </div>

    <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg mb-8">
      <h2 class="text-xl font-semibold mb-4 text-white flex items-center gap-2">
        <span>⚔️</span> เพิ่มตัวละครใหม่
      </h2>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
        <input id="charName" placeholder="ชื่อตัวละคร" 
               class="col-span-1 sm:col-span-2 w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
        
        <input id="charLevel" type="number" min="1" max="20" placeholder="เลเวล (ปกติเริ่ม 3)" 
               class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
        
        <input id="charClass" placeholder="อาชีพ" 
               class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
        
        <input id="charRace" placeholder="เผ่า" 
               class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
        
        <input id="charGold" type="number" placeholder="ทองเริ่มต้น" 
               class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
      </div>

      <input id="sheetLink" placeholder="ลิงก์ชีทตัวละคร Character Sheet (URL)" 
             class="w-full p-2.5 mb-4 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
      
      <p class="text-xs text-blue-300">
          หมายเหตุ: สามารถวางลิงก์ชีทตัวละคร D&D Beyond ลงในช่องลิงก์ชีทตัวละคนเพื่อดึงข้อมูลได้
      </p>
             
      <button onclick="addCharacter()" class="w-full sm:w-auto bg-green-600 hover:bg-green-500 text-white font-bold px-6 py-2.5 rounded-lg shadow transition">
        บันทึกตัวละคร
      </button>
    </div>

    <div id="charactersList" class="space-y-4"></div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/fetch.js"></script>
  
  <script>
    let currentUser = null;

    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      currentUser = session.user;
      document.getElementById('userEmail').textContent = currentUser.email;
      
      checkAdmin();
      loadCharacters();
    }
    init();

    async function checkAdmin() {
        const { data } = await supabase.rpc('is_admin'); // เรียกใช้ function SQL
        if (data) document.getElementById('adminBtn').style.display = 'inline-flex';
    }

    async function addCharacter() {
      const name = document.getElementById('charName').value.trim();
      if (!name) return alert('ใส่ชื่อตัวละคร');

      const { error } = await supabase.from('characters').insert({
        user_id: currentUser.id,
        name: name,
        level: document.getElementById('charLevel').value || 1,
        class: document.getElementById('charClass').value || 'None',
        race: document.getElementById('charRace').value || 'None',
        gold_start: document.getElementById('charGold').value || 0,
        sheet_link: document.getElementById('sheetLink').value
      });

      if (error) alert('Error: ' + error.message);
      else {
        alert('✅ เพิ่มสำเร็จ!');
        loadCharacters();
        // Clear inputs...
        document.querySelectorAll('input').forEach(i => i.value = '');
      }
    }

    async function loadCharacters() {
      // ดึงจาก View 'character_stats'
      const { data, error } = await supabase
        .from('character_stats')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false }); // ต้องแก้ View ให้ return created_at ด้วย หรือใช้ id แทน

      if (error) return console.error(error);
      
      const list = document.getElementById('charactersList');
      list.innerHTML = '';
      
      data.forEach(c => {
        const { level: currentLevel } = calculateCurrentLevel(c.base_level || 1, Number(c.total_hours || 0));
        
        list.innerHTML += `
          <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-md flex justify-between items-center">
             <div>
                <h3 class="font-bold text-xl text-yellow-500">${c.name} <span class="text-gray-400 text-sm">(Lv. ${currentLevel})</span></h3>
                <p class="text-gray-300 text-sm">${c.class || '-'} | ${c.race || '-'} | 💰 ${(Number(c.total_gold)||0).toLocaleString()} gp</p>
             </div>
             <div class="flex items-center gap-3">
                <a href="character-detail.html?charId=${c.character_id}" class="text-indigo-400 hover:text-indigo-300">📝 รายละเอียด</a>
                <button onclick="deleteChar('${c.character_id}')" class="text-red-400 hover:text-red-300 ml-2">🗑️ ลบ</button>
             </div>
          </div>
        `;
      });
    }

    async function deleteChar(id) {
        if(!confirm('ยืนยันลบ?')) return;
        const { error } = await supabase.from('characters').delete().eq('id', id);
        if(error) alert(error.message);
        else loadCharacters();
    }

    async function handleLogout() {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
    }

    // Helper Level Calculation (Copy same logic)
    const LEVEL_HOURS = [0, 0, 3.5, 10.5, 21, 35, 52.5, 70, 91, 115.5, 143.5, 175, 210, 248.5, 290.5, 336, 385, 437.5, 493.5, 553, 616, 682.5, 752.5, 826, 903, 983.5, 1067.5, 1155, 1246, 1340.5, 1438.5, 1540];
    function calculateCurrentLevel(start, hours) {
        let lvl = start;
        const total = (LEVEL_HOURS[start] || 0) + hours;
        for(let i=start+1; i<=30; i++) { if(total >= LEVEL_HOURS[i]) lvl = i; else break; }
        return { level: lvl };
    }
  </script>
</body>
</html>
