<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>The Spire Tracking - เข้าสู่ระบบ</title>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen flex items-center justify-center font-sans">
  
  <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md mx-4 border border-gray-700">
    
    <h2 class="text-3xl font-bold mb-6 text-center text-white">
      <span class="text-yellow-500">The Spire</span> Tracking
    </h2>
    <p class="text-center text-gray-400 mb-6 text-sm">ระบบจัดการข้อมูลตัวละคร</p>

    <div id="login-form">
      <div class="space-y-4">
        <div>
           <label class="block text-sm font-medium text-gray-400 mb-1">อีเมล</label>
           <input id="email" type="email" placeholder="name@example.com" 
                  class="w-full p-3 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition"/>
        </div>
        <div>
           <label class="block text-sm font-medium text-gray-400 mb-1">รหัสผ่าน</label>
           <input id="password" type="password" placeholder="••••••••" 
                  class="w-full p-3 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition"/>
        </div>
        
        <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold p-3 rounded transition shadow-lg mt-2">
          เข้าสู่ระบบ
        </button>
      </div>

      <p class="text-center mt-6 text-gray-400 text-sm">
        ยังไม่มีบัญชี? <button onclick="showRegister()" class="text-blue-400 hover:text-blue-300 font-semibold underline decoration-dotted">สมัครเลย</button>
      </p>
    </div>

    <div id="register-form" style="display:none">
      <div class="space-y-4">
        <div>
           <label class="block text-sm font-medium text-gray-400 mb-1">อีเมลสำหรับสมัคร</label>
           <input id="reg-email" type="email" placeholder="name@example.com" 
                  class="w-full p-3 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"/>
        </div>
        <div>
           <label class="block text-sm font-medium text-gray-400 mb-1">กำหนดรหัสผ่าน</label>
           <input id="reg-password" type="password" placeholder="••••••••" 
                  class="w-full p-3 rounded bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"/>
        </div>

        <button onclick="register()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold p-3 rounded transition shadow-lg mt-2">
          สมัครสมาชิก
        </button>
      </div>

      <p class="text-center mt-6 text-gray-400 text-sm">
        มีบัญชีแล้ว? <button onclick="showLogin()" class="text-blue-400 hover:text-blue-300 font-semibold underline decoration-dotted">เข้าสู่ระบบ</button>
      </p>
    </div>

    <div class="mt-8 border-t border-gray-700 pt-4">
      <p class="text-xs text-gray-500 text-center leading-relaxed">
        &copy;🏰 The Spire Tracking<br>
        Create by <span class="text-gray-400">aKittyCat🐈</span>. All rights reserved.
      </p>
    </div>
  </div>

  <script>
    function showRegister() { 
      document.getElementById('register-form').style.display = 'block'; 
      document.getElementById('login-form').style.display = 'none'; 
      document.title = "The Spire Tracking - สมัครสมาชิก";
    }
    
    function showLogin() { 
      document.getElementById('login-form').style.display = 'block'; 
      document.getElementById('register-form').style.display = 'none'; 
      document.title = "The Spire Tracking - เข้าสู่ระบบ";
    }

    function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      auth.signInWithEmailAndPassword(email, password)
        .then(() => window.location.href = 'characters.html')
        .catch(e => alert('เกิดข้อผิดพลาด: ' + e.message));
    }

    function register() {
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => window.location.href = 'characters.html')
        .catch(e => alert('เกิดข้อผิดพลาด: ' + e.message));
    }
  </script>
</body>
</html>
