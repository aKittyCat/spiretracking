<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="firebase-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Admin Dashboard</title>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-6 pb-4 border-b">
      <h1 class="text-3xl font-bold">Admin Dashboard</h1>
      <div class="flex items-center space-x-4">
        <span class="text-gray-700 font-medium">สมาชิก: <span id="userEmail">...</span></span>
        <button onclick="auth.signOut().then(() => location.href='index.html')" 
                class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-medium shadow transition">
          ออกจากระบบ
        </button>
      </div>
    </div>
    <a href="characters.html" class="mb-4 inline-block bg-gray-500 text-white px-3 py-1 rounded">กลับหน้าตัวละคร</a>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white p-4 rounded shadow">
        <canvas id="levelChart" height="100"></canvas>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <canvas id="classChart" height="100"></canvas>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <canvas id="raceChart" height="100"></canvas>
      </div>
    </div>

    <h2 class="text-xl font-semibold mb-4">ตัวละครทั้งหมด (<span id="charCount">...</span>)</h2>
    <div id="allChars" class="space-y-3"></div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    let chartInstances = [];

    auth.onAuthStateChanged(async user => {
      if (!user) return location.href = 'index.html';
      document.getElementById('userEmail').textContent = user.email;
      
      try {
        // ดึงการตั้งค่า admin จาก Firestore
        const settingsDoc = await db.collection('settings').doc('admin').get();
        const adminData = settingsDoc.data();
        
        // ตรวจสอบว่ามีข้อมูล admin หรือไม่
        if (!adminData || !Array.isArray(adminData.adminEmails)) {
          alert('❌ ไม่พบการตั้งค่า admin ที่ถูกต้อง!');
          return location.href = 'characters.html';
        }
        
        // เปรียบเทียบอีเมล (แปลงเป็นตัวพิมพ์เล็กและลบช่องว่าง)
        const currentEmail = user.email?.trim().toLowerCase();
        const adminEmails = adminData.adminEmails
          .map(email => String(email).trim().toLowerCase());
        
        // ตรวจสอบสิทธิ์
        if (!currentEmail || !adminEmails.includes(currentEmail)) {
          alert('🚫 คุณไม่มีสิทธิ์เข้าถึงหน้านี้');
          return location.href = 'characters.html';
        }
        
        // โหลดข้อมูลทั้งหมด
        await loadAllData();
      } catch (error) {
        console.error('💥 เกิดข้อผิดพลาด:', error);
        alert('ตรวจสอบสิทธิ์ล้มเหลว: ' + (error.message || 'ไม่สามารถเชื่อมต่อได้'));
        location.href = 'characters.html';
      }
    });

    async function loadAllData() {
      await loadAllCharacters();
      await loadCharts();
    }

    async function loadAllCharacters() {
      try {
        const snap = await db.collection('characters').get();
        const list = document.getElementById('allChars');
        const countEl = document.getElementById('charCount');
        
        if (countEl) countEl.textContent = snap.size;
        list.innerHTML = '';
        
        snap.forEach(doc => {
          const c = doc.data();
          const div = document.createElement('div');
          div.className = 'bg-white p-3 rounded border';
          div.innerHTML = `
            <strong>${c.name}</strong> | Lv.${c.level} | ${c.class} | ${c.race} | ทอง: ${c.gold}
            <br><small>ผู้เล่น UID: ${c.userId}</small>
            <a href="character-detail.html?charId=${doc.id}&admin=true" class="ml-2 text-blue-500 text-sm">ดูรายละเอียด</a>
            <button onclick="deleteCharAdmin('${doc.id}')" class="ml-2 text-red-500 text-sm mt-1">ลบ</button>
          `;
          list.appendChild(div);
        });
      } catch (error) {
        console.error('Error loading characters:', error);
        document.getElementById('allChars').innerHTML = 
          '<p class="text-red-500">โหลดข้อมูลล้มเหลว: ' + error.message + '</p>';
      }
    }

    async function deleteCharAdmin(charId) {
      if (!confirm('⚠️ ลบตัวละครนี้จริงหรือ? ข้อมูลทั้งหมดจะหายไป!')) return;
      
      const result = await deleteCharacterAndData(charId, false);
      if (result.success) {
        alert(result.message);
        loadAllData();
      } else {
        alert('❌ ' + result.message);
      }
    }

    async function loadCharts() {
      // ลบกราฟเก่า
      chartInstances.forEach(c => c.destroy());
      chartInstances = [];

      try {
        const snap = await db.collection('characters').get();
        const chars = snap.docs.map(d => d.data());

        if (chars.length === 0) return;

        // Level Average
        const levelCtx = document.getElementById('levelChart')?.getContext('2d');
        if (levelCtx) {
          const avgLevel = chars.reduce((sum, c) => sum + c.level, 0) / chars.length;
          const levelChart = new Chart(levelCtx, {
            type: 'bar',
            data: {
              labels: ['Average Level'],
              datasets: [{
                label: 'เลเวลเฉลี่ย',
                data: [parseFloat(avgLevel.toFixed(1))],
                backgroundColor: 'rgba(54, 162, 235, 0.6)'
              }]
            },
            options: { 
              responsive: true, 
              plugins: { legend: { display: false } },
              scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
          });
          chartInstances.push(levelChart);
        }

        // Class Count
        const classCount = {};
        chars.forEach(c => {
          const cls = c.class || 'Unknown';
          classCount[cls] = (classCount[cls] || 0) + 1;
        });
        const classCtx = document.getElementById('classChart')?.getContext('2d');
        if (classCtx) {
          const classChart = new Chart(classCtx, {
            type: 'pie',
            data: {
              labels: Object.keys(classCount),
              datasets: [{
                data: Object.values(classCount),
                backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40']
              }]
            },
            options: { responsive: true }
          });
          chartInstances.push(classChart);
        }

        // Race Count
        const raceCount = {};
        chars.forEach(c => {
          const race = c.race || 'Unknown';
          raceCount[race] = (raceCount[race] || 0) + 1;
        });
        const raceCtx = document.getElementById('raceChart')?.getContext('2d');
        if (raceCtx) {
          const raceChart = new Chart(raceCtx, {
            type: 'doughnut',
            data: {
              labels: Object.keys(raceCount),
              datasets: [{
                data: Object.values(raceCount),
                backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#C9CBCF']
              }]
            },
            options: { responsive: true }
          });
          chartInstances.push(raceChart);
        }
      } catch (error) {
        console.error('Error loading charts:', error);
      }
    }
  </script>
</body>
</html>
